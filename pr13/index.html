<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR13: Offline Notes</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        .form-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        ul { list-style: none; padding: 0; }
        li { background: #f9f9f9; padding: 10px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; margin-left: 10px; }
        #status { margin-top: 20px; padding: 10px; border-radius: 4px; text-align: center; font-weight: bold; }
        .online { background-color: #d4edda; color: #155724; }
        .offline { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h1>📝 Мои Заметки (Offline)</h1>
    
    <div id="status" class="online">Проверка подключения...</div>

    <div class="form-group">
        <input type="text" id="noteInput" placeholder="Введите заметку...">
        <button id="addBtn">Добавить</button>
    </div>

    <ul id="notesList"></ul>

    <script src="app.js"></script>
</body>
</html>
