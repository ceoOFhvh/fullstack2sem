<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара - Практическая №1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="product-card">
        <div class="product-card__image-wrapper">
            <!-- Заглушка для фотографии -->
            <img src="kds.jpg" alt="Фото товара KDS" class="product-card__image">
        </div>
        
        <div class="product-card__content">
            <h2 class="product-card__title">Смартфон SuperPhone X</h2>
            <p class="product-card__description">
                Мощный процессор, отличная камера и долгая работа от батареи. 
                Идеальный выбор для повседневных задач.
            </p>
            <button class="product-card__btn">Купить за 29 990 ₽</button>
        </div>
    </div>

</body>
</html>
